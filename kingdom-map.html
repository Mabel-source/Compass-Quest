<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Compass Realm — Safety Quest Progress</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap');

:root {
  --gold: #c8a951;
  --gold-dim: #8a7235;
  --dark: #0a0a1a;
  --dark2: #1a1a2e;
  --green: #50fa7b;
  --red: #ff5555;
  --cyan: #8be9fd;
  --sky: #4a90d9;
  --grass: #2d5a1e;
  --grass2: #3a7a28;
  --path: #c4a265;
  --brown: #5a3a1a;
  --stone: #6a6a7a;
  --white: #f0f0ff;
  --castle-wall: #8a8a9a;
  --castle-dark: #5a5a6a;
  --flag-green: #3aaa3a;
  --wood: #6a4a2a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; min-height: 100vh; background: #000; font-family: 'Rajdhani', sans-serif; font-weight: 500; }

.kingdom-container {
  width: 100%; max-width: 1100px; margin: 0 auto; padding: 16px;
  min-height: 100vh; display: flex; flex-direction: column;
}

/* Header */
.kingdom-header {
  text-align: center; padding: 24px 16px 16px;
  background: linear-gradient(180deg, #1a2a3a 0%, transparent 100%);
  border-radius: 12px 12px 0 0;
}
.kingdom-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(14px, 3.5vw, 24px);
  color: var(--gold);
  text-shadow: 2px 2px 0 var(--gold-dim), 0 0 20px rgba(200,169,81,0.3);
  margin-bottom: 8px;
}
.kingdom-subtitle {
  font-size: clamp(14px, 3vw, 18px);
  color: var(--cyan);
  font-weight: 600;
  letter-spacing: 2px;
}

/* World Map Area */
.world-map {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  min-height: 400px;
  background: linear-gradient(180deg, #4a8ad4 0%, #6ab4e8 20%, #88cc88 45%, #3a7a28 65%, #2d5a1e 85%, #1a3a0e 100%);
  border: 3px solid var(--gold-dim);
  border-radius: 8px;
  overflow: hidden;
  margin: 16px 0;
}

/* Clouds */
.wm-cloud {
  position: absolute; background: rgba(255,255,255,0.6); border-radius: 20px; z-index: 1;
}
.wm-cloud::before, .wm-cloud::after {
  content: ''; position: absolute; background: rgba(255,255,255,0.6); border-radius: 50%;
}
.wm-c1 { width: 70px; height: 18px; top: 5%; left: 8%; animation: wdrift 22s linear infinite; }
.wm-c1::before { width: 28px; height: 28px; top: -14px; left: 14px; }
.wm-c1::after { width: 20px; height: 20px; top: -8px; left: 36px; }
.wm-c2 { width: 55px; height: 14px; top: 8%; left: 45%; animation: wdrift 28s linear infinite 4s; }
.wm-c2::before { width: 22px; height: 22px; top: -11px; left: 10px; }
.wm-c2::after { width: 16px; height: 16px; top: -6px; left: 28px; }
.wm-c3 { width: 60px; height: 16px; top: 3%; left: 75%; animation: wdrift 24s linear infinite 8s; }
.wm-c3::before { width: 24px; height: 24px; top: -12px; left: 12px; }
.wm-c3::after { width: 18px; height: 18px; top: -7px; left: 30px; }
@keyframes wdrift { 0%{transform:translateX(0)} 100%{transform:translateX(-150px)} }

/* Mountains */
.wm-mountains {
  position: absolute; bottom: 35%; width: 100%; height: 25%;
  background: #5a6a7a;
  clip-path: polygon(0 100%, 0 70%, 8% 25%, 16% 60%, 24% 10%, 32% 55%, 42% 20%, 52% 50%, 60% 8%, 68% 45%, 76% 18%, 84% 55%, 92% 30%, 100% 40%, 100% 100%);
  z-index: 2;
}
.wm-mountains::after {
  content: ''; position: absolute; inset: 0;
  background: #7a8a9a;
  clip-path: polygon(0 100%, 8% 40%, 16% 65%, 24% 20%, 32% 60%, 42% 30%, 52% 55%, 60% 18%, 68% 50%, 76% 28%, 84% 60%, 92% 40%, 100% 50%, 100% 100%);
}

/* Water features */
.wm-water {
  position: absolute; bottom: 0; width: 100%; height: 12%;
  background: linear-gradient(180deg, #2a5a8a 0%, #1a3a5a 100%);
  z-index: 3;
}
.wm-water::before {
  content: ''; position: absolute; top: 0; width: 100%; height: 4px;
  background: repeating-linear-gradient(90deg, transparent 0, transparent 20px, rgba(139,233,253,0.3) 20px, rgba(139,233,253,0.3) 22px);
  animation: waves 3s linear infinite;
}
@keyframes waves { 0%{transform:translateX(0)} 100%{transform:translateX(22px)} }

/* Site territories */
.site-territory {
  position: absolute; z-index: 10;
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; transition: transform 0.3s;
}
.site-territory:hover { transform: scale(1.08); }

/* Site visual — castle/village drawing */
.site-visual {
  position: relative; width: 80px; height: 70px;
}

/* Village tier (0-25%) */
.tier-village .sv-building {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 28px; height: 22px; background: var(--wood); border: 1px solid var(--brown);
  border-radius: 2px;
}
.tier-village .sv-building::before {
  content: ''; position: absolute; top: -12px; left: -4px; right: -4px; height: 14px;
  background: var(--brown); clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}
.tier-village .sv-building::after {
  content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 8px; height: 10px; background: #2a1a0a; border-radius: 4px 4px 0 0;
}

/* Town tier (26-50%) */
.tier-town .sv-tower {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 22px; height: 35px; background: var(--stone); border: 1px solid #5a5a6a;
}
.tier-town .sv-tower::before {
  content: ''; position: absolute; top: -8px; left: 0; right: 0; height: 8px;
  background: var(--stone);
  clip-path: polygon(0 100%, 15% 0, 30% 100%, 50% 0, 70% 100%, 85% 0, 100% 100%);
}
.tier-town .sv-house {
  position: absolute; bottom: 0; width: 20px; height: 16px; background: var(--wood); border: 1px solid var(--brown);
}
.tier-town .sv-house.left { left: 5px; }
.tier-town .sv-house.right { right: 5px; }
.tier-town .sv-house::before {
  content: ''; position: absolute; top: -8px; left: -2px; right: -2px; height: 9px;
  background: var(--brown); clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

/* Fortress tier (51-75%) */
.tier-fortress .sv-keep {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 30px; height: 40px; background: var(--castle-wall); border: 1px solid var(--castle-dark);
}
.tier-fortress .sv-keep::before {
  content: ''; position: absolute; top: -8px; left: 0; right: 0; height: 8px;
  background: var(--castle-wall);
  clip-path: polygon(0 100%, 15% 0, 30% 100%, 50% 0, 70% 100%, 85% 0, 100% 100%);
}
.tier-fortress .sv-ftower {
  position: absolute; bottom: 0; width: 16px; height: 48px; background: var(--castle-wall);
  border: 1px solid var(--castle-dark);
}
.tier-fortress .sv-ftower.left { left: 8px; }
.tier-fortress .sv-ftower.right { right: 8px; }
.tier-fortress .sv-ftower::before {
  content: ''; position: absolute; top: -6px; left: 0; right: 0; height: 6px;
  background: var(--castle-wall);
  clip-path: polygon(0 100%, 20% 0, 40% 100%, 60% 0, 80% 100%, 100% 0);
}
.tier-fortress .sv-gate {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 12px; height: 16px; background: #2a2a3a; border-radius: 6px 6px 0 0;
}
.tier-fortress .sv-flag {
  position: absolute; top: -14px; width: 10px; height: 7px; background: var(--gold);
}
.tier-fortress .sv-flag.fl { left: 11px; }
.tier-fortress .sv-flag.fr { right: 11px; }

/* Castle tier (76-100%) */
.tier-castle .sv-main {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 36px; height: 44px; background: var(--castle-wall); border: 1px solid var(--castle-dark);
}
.tier-castle .sv-main::before {
  content: ''; position: absolute; top: -8px; left: 0; right: 0; height: 8px;
  background: var(--castle-wall);
  clip-path: polygon(0 100%, 12% 0, 24% 100%, 38% 0, 52% 100%, 66% 0, 78% 100%, 90% 0, 100% 100%);
}
.tier-castle .sv-ctower {
  position: absolute; bottom: 0; width: 18px; background: var(--castle-wall);
  border: 1px solid var(--castle-dark);
}
.tier-castle .sv-ctower.left { left: 2px; height: 56px; }
.tier-castle .sv-ctower.right { right: 2px; height: 56px; }
.tier-castle .sv-ctower::before {
  content: ''; position: absolute; top: -8px; left: 0; right: 0; height: 8px;
  background: var(--castle-wall);
  clip-path: polygon(0 100%, 20% 0, 40% 100%, 60% 0, 80% 100%, 100% 0);
}
.tier-castle .sv-cgate {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 14px; height: 20px; background: #2a2a3a; border-radius: 7px 7px 0 0;
}
.tier-castle .sv-cflag {
  position: absolute; top: -16px; width: 12px; height: 8px;
}
.tier-castle .sv-cflag.fl { left: 5px; background: var(--flag-green); }
.tier-castle .sv-cflag.fr { right: 5px; background: var(--gold); }
.tier-castle .sv-banner {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 16px; height: 12px; background: var(--gold); border-radius: 0 0 3px 3px;
  clip-path: polygon(0 0, 100% 0, 100% 70%, 50% 100%, 0 70%);
}
.tier-castle .glow {
  position: absolute; inset: -10px; border-radius: 50%;
  background: radial-gradient(circle, rgba(200,169,81,0.25) 0%, transparent 70%);
  animation: castleGlow 3s ease-in-out infinite;
}
@keyframes castleGlow {
  0%,100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* Site label */
.site-label {
  margin-top: 4px; text-align: center;
}
.site-name {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 1.6vw, 10px);
  color: var(--white);
  text-shadow: 1px 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.7);
  white-space: nowrap;
}
.site-score {
  font-size: clamp(11px, 2.5vw, 14px);
  color: var(--gold);
  font-weight: 700;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}
.site-tier-label {
  font-size: clamp(9px, 2vw, 11px);
  color: var(--cyan);
  font-weight: 600;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}

/* Tooltip popup */
.site-tooltip {
  display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
  background: rgba(10,10,26,0.95); border: 2px solid var(--gold);
  border-radius: 8px; padding: 14px 18px; min-width: 200px; z-index: 100;
  text-align: left;
}
.site-territory:hover .site-tooltip,
.site-territory:focus .site-tooltip { display: block; }
.tt-name { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--gold); margin-bottom: 8px; }
.tt-row { display: flex; justify-content: space-between; margin: 4px 0; }
.tt-label { font-size: 14px; color: #aaa; font-weight: 600; }
.tt-value { font-size: 14px; color: var(--white); font-weight: 700; }
.tt-bar-bg { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 8px; overflow: hidden; }
.tt-bar-fill { height: 100%; border-radius: 5px; transition: width 1s ease; }

/* Legend */
.kingdom-legend {
  display: flex; flex-wrap: wrap; gap: 16px; justify-content: center;
  padding: 16px; margin-top: 8px;
}
.legend-item {
  display: flex; align-items: center; gap: 8px;
  font-size: clamp(12px, 2.5vw, 14px); color: var(--white); font-weight: 600;
}
.legend-icon {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

/* Stats bar */
.kingdom-stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; padding: 16px;
}
.stat-card {
  background: rgba(26,26,46,0.8); border: 1px solid rgba(200,169,81,0.3);
  border-radius: 8px; padding: 14px 16px; text-align: center;
}
.stat-value {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(16px, 3.5vw, 22px);
  color: var(--gold);
}
.stat-label {
  font-size: clamp(12px, 2.5vw, 14px);
  color: #8899aa;
  font-weight: 600; margin-top: 4px;
}

/* Loading / error */
.loading-msg {
  text-align: center; padding: 60px 20px;
  font-size: clamp(10px, 2.5vw, 14px);
  font-family: 'Press Start 2P', monospace;
  color: var(--gold);
  animation: blink 1.2s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.error-msg {
  text-align: center; padding: 40px 20px;
  color: var(--red); font-size: clamp(14px, 3vw, 18px); font-weight: 600;
}

/* Footer */
.kingdom-footer {
  text-align: center; padding: 12px;
  font-size: clamp(11px, 2.2vw, 13px); color: #556677;
}

/* Responsive */
@media (max-width: 600px) {
  .world-map { aspect-ratio: 4 / 3; min-height: 320px; }
  .site-visual { width: 55px; height: 50px; transform: scale(0.75); }
  .site-tooltip { min-width: 160px; padding: 10px 12px; }
  .kingdom-stats { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="kingdom-container">
  <div class="kingdom-header">
    <div class="kingdom-title">COMPASS REALM</div>
    <div class="kingdom-subtitle">SAFETY QUEST PROGRESS MAP</div>
  </div>

  <div id="loadingArea" class="loading-msg">LOADING KINGDOM DATA...</div>
  <div id="errorArea" class="error-msg" style="display:none;"></div>

  <div id="mapArea" style="display:none;">
    <div class="world-map" id="worldMap">
      <!-- Scenery -->
      <div class="wm-cloud wm-c1"></div>
      <div class="wm-cloud wm-c2"></div>
      <div class="wm-cloud wm-c3"></div>
      <div class="wm-mountains"></div>
      <div class="wm-water"></div>
      <!-- Sites injected by JS -->
    </div>

    <div class="kingdom-stats" id="statsArea"></div>

    <div class="kingdom-legend">
      <div class="legend-item"><div class="legend-icon">🏚️</div> Emerging Kingdom (0–25%)</div>
      <div class="legend-item"><div class="legend-icon">🏘️</div> Rising Kingdom (26–50%)</div>
      <div class="legend-item"><div class="legend-icon">🏰</div> Mighty Kingdom (51–75%)</div>
      <div class="legend-item"><div class="legend-icon">👑</div> Legendary Kingdom (76–100%)</div>
    </div>
  </div>

  <div class="kingdom-footer">
    Compass Datacenters — Safety Realm &copy; 2026
  </div>
</div>

<script>
/* ================================================================
   CONFIGURATION — Edit these to match your environment
   ================================================================ */

// URL to your kingdom-data.json on SharePoint (publicly accessible or same-origin)
// For local testing, set to a relative path or paste JSON inline below.
const DATA_URL = '';

// If DATA_URL is empty, the map uses this inline sample data.
// Replace with [] once live SharePoint URL is configured.
const SAMPLE_DATA = [
  {"Site":"DFW","Score":2130.0,"Game":"Safety Challenge","Player":"Rachel Neal"},
  {"Site":"DFW","Score":1122.0,"Game":"Safety Challenge","Player":"Scott McMillan"},
  {"Site":"DFW","Score":2349.0,"Game":"Safety Challenge","Player":"Harry"},
  {"Site":"DFW","Score":2277.0,"Game":"Safety Challenge","Player":"Rachel Neal"},
  {"Site":"DFW","Score":391.0,"Game":"Safety Challenge","Player":"Candy"},
  {"Site":"DFW","Score":967.0,"Game":"Safety Challenge","Player":"Kris Lyness"},
  {"Site":"DFW","Score":977.0,"Game":"Safety Challenge","Player":"Kris Lyness"},
  {"Site":"ORD","Score":820.0,"Game":"Safety Challenge","Player":"Mabel"},
  {"Site":"MXP I","Score":377.0,"Game":"Safety Challenge","Player":"Mabel"},
  {"Site":"ORD","Score":405.0,"Game":"Safety Challenge","Player":"dfgh"},
  {"Site":"JAN I","Score":1457.0,"Game":"Safety Challenge","Player":"Testing 3"},
  {"Site":"PHX II","Score":976.0,"Game":"Safety Challenge","Player":"Trading 4"},
  {"Site":"PHX II","Score":592.0,"Game":"Safety Challenge","Player":"mabel"},
  {"Site":"ORD","Score":1494.0,"Game":"Safety Challenge","Player":"Mabel"},
  {"Site":"MXP I","Score":1872.0,"Game":"Safety Challenge","Player":"Jerry"},
  {"Site":"ORD","Score":2358.0,"Game":"Safety Challenge","Player":"Ash"},
  {"Site":"JAN I","Score":2355.0,"Game":"Safety Challenge","Player":"Ron"},
  {"Site":"DFW","Score":121.0,"Game":"Safety Challenge","Player":"Anna Carlton"},
  {"Site":"DFW","Score":0.0,"Game":"Safety Challenge","Player":"Rachel Neal"}
];

// Known sites and their positions on the map (% from left, % from top)
// Add new sites here as they come online.
const SITE_CONFIG = {
  'DFW':    { fullName: 'Kingdom of Dallas-Fort Worth',  x: 14, y: 42 },
  'JAN I':  { fullName: 'Kingdom of Jackson I',          x: 32, y: 55 },
  'MXP I':  { fullName: 'Kingdom of Milan I',            x: 50, y: 30 },
  'ORD':    { fullName: 'Kingdom of Chicago',             x: 68, y: 45 },
  'PHX I':  { fullName: 'Kingdom of Phoenix I',           x: 38, y: 72 },
  'PHX II': { fullName: 'Kingdom of Phoenix II',          x: 82, y: 60 }
};

// Max possible score per game play (for percentage calculation)
const MAX_SCORE = 2500;

// Target participation count per site (for participation %)
const TARGET_PARTICIPATION = 20;

/* ================================================================
   DATA PROCESSING
   ================================================================ */

function processData(rawData) {
  const sites = {};
  rawData.forEach(row => {
    const s = row.Site;
    if (!s) return;
    if (!sites[s]) sites[s] = { scores: [], players: new Set(), games: new Set() };
    sites[s].scores.push(row.Score || 0);
    sites[s].players.add((row.Player || '').toLowerCase().trim());
    sites[s].games.add(row.Game || 'Unknown');
  });

  const results = {};
  for (const [site, data] of Object.entries(sites)) {
    const avgScore = data.scores.reduce((a, b) => a + b, 0) / data.scores.length;
    const scorePct = Math.min(100, (avgScore / MAX_SCORE) * 100);
    const participationPct = Math.min(100, (data.players.size / TARGET_PARTICIPATION) * 100);
    const combined = (scorePct * 0.5) + (participationPct * 0.5);

    let tier, tierLabel;
    if (combined <= 25) { tier = 'village'; tierLabel = 'Emerging Kingdom'; }
    else if (combined <= 50) { tier = 'town'; tierLabel = 'Rising Kingdom'; }
    else if (combined <= 75) { tier = 'fortress'; tierLabel = 'Mighty Kingdom'; }
    else { tier = 'castle'; tierLabel = 'Legendary Kingdom'; }

    results[site] = {
      avgScore: Math.round(avgScore),
      scorePct: Math.round(scorePct),
      players: data.players.size,
      participationPct: Math.round(participationPct),
      combined: Math.round(combined),
      totalPlays: data.scores.length,
      tier, tierLabel,
      games: [...data.games]
    };
  }
  return results;
}

/* ================================================================
   RENDERING
   ================================================================ */

function getTierColor(pct) {
  if (pct <= 25) return '#8a6a3a';
  if (pct <= 50) return '#6a8a6a';
  if (pct <= 75) return '#4a90d9';
  return '#c8a951';
}

function buildSiteHTML(siteName, data, config) {
  const t = data.tier;
  let buildingHTML = '';

  if (t === 'village') {
    buildingHTML = '<div class="sv-building"></div>';
  } else if (t === 'town') {
    buildingHTML = '<div class="sv-house left"></div><div class="sv-tower"></div><div class="sv-house right"></div>';
  } else if (t === 'fortress') {
    buildingHTML = '<div class="sv-ftower left"></div><div class="sv-keep"></div><div class="sv-ftower right"></div><div class="sv-gate"></div><div class="sv-flag fl"></div><div class="sv-flag fr"></div>';
  } else {
    buildingHTML = '<div class="glow"></div><div class="sv-ctower left"></div><div class="sv-main"></div><div class="sv-ctower right"></div><div class="sv-cgate"></div><div class="sv-cflag fl"></div><div class="sv-cflag fr"></div><div class="sv-banner"></div>';
  }

  const barColor = getTierColor(data.combined);
  const fullName = config.fullName || siteName;

  return `
    <div class="site-territory tier-${t}" style="left:${config.x}%;top:${config.y}%;transform:translate(-50%,-50%)" tabindex="0">
      <div class="site-tooltip">
        <div class="tt-name">${fullName}</div>
        <div class="tt-row"><span class="tt-label">Avg Score</span><span class="tt-value">${data.avgScore} / ${MAX_SCORE}</span></div>
        <div class="tt-row"><span class="tt-label">Score Rating</span><span class="tt-value">${data.scorePct}%</span></div>
        <div class="tt-row"><span class="tt-label">Players</span><span class="tt-value">${data.players} / ${TARGET_PARTICIPATION}</span></div>
        <div class="tt-row"><span class="tt-label">Participation</span><span class="tt-value">${data.participationPct}%</span></div>
        <div class="tt-row"><span class="tt-label">Total Plays</span><span class="tt-value">${data.totalPlays}</span></div>
        <div class="tt-row"><span class="tt-label">Overall</span><span class="tt-value" style="color:${barColor}">${data.combined}%</span></div>
        <div class="tt-bar-bg"><div class="tt-bar-fill" style="width:${data.combined}%;background:${barColor}"></div></div>
        <div class="tt-row"><span class="tt-label">Status</span><span class="tt-value" style="color:var(--cyan)">${data.tierLabel}</span></div>
      </div>
      <div class="site-visual">${buildingHTML}</div>
      <div class="site-label">
        <div class="site-name">${siteName}</div>
        <div class="site-score">${data.combined}%</div>
        <div class="site-tier-label">${data.tierLabel}</div>
      </div>
    </div>
  `;
}

function buildStats(siteData) {
  const sites = Object.keys(siteData);
  const totalPlayers = Object.values(siteData).reduce((s, d) => s + d.players, 0);
  const totalPlays = Object.values(siteData).reduce((s, d) => s + d.totalPlays, 0);
  const avgCombined = sites.length ? Math.round(Object.values(siteData).reduce((s, d) => s + d.combined, 0) / sites.length) : 0;

  // Find leader
  let leader = '—';
  let leaderScore = 0;
  for (const [site, data] of Object.entries(siteData)) {
    if (data.combined > leaderScore) { leaderScore = data.combined; leader = site; }
  }

  return `
    <div class="stat-card"><div class="stat-value">${sites.length}</div><div class="stat-label">Active Sites</div></div>
    <div class="stat-card"><div class="stat-value">${totalPlayers}</div><div class="stat-label">Unique Players</div></div>
    <div class="stat-card"><div class="stat-value">${totalPlays}</div><div class="stat-label">Total Plays</div></div>
    <div class="stat-card"><div class="stat-value">${avgCombined}%</div><div class="stat-label">Realm Average</div></div>
    <div class="stat-card"><div class="stat-value">${leader}</div><div class="stat-label">Leading Site</div></div>
  `;
}

function render(siteData) {
  const map = document.getElementById('worldMap');
  const stats = document.getElementById('statsArea');

  // Add sites to map
  for (const [siteName, data] of Object.entries(siteData)) {
    const config = SITE_CONFIG[siteName];
    if (!config) {
      // Unknown site — auto-place it
      const knownCount = Object.keys(SITE_CONFIG).length;
      const autoX = 15 + ((knownCount * 17) % 75);
      const autoY = 30 + ((knownCount * 13) % 40);
      SITE_CONFIG[siteName] = { fullName: siteName, x: autoX, y: autoY };
    }
    const cfg = SITE_CONFIG[siteName];
    map.insertAdjacentHTML('beforeend', buildSiteHTML(siteName, data, cfg));
  }

  // Also show empty sites from config that have no data yet
  for (const [siteName, cfg] of Object.entries(SITE_CONFIG)) {
    if (!siteData[siteName]) {
      const emptyData = { avgScore: 0, scorePct: 0, players: 0, participationPct: 0, combined: 0, totalPlays: 0, tier: 'village', tierLabel: 'Emerging Kingdom', games: [] };
      map.insertAdjacentHTML('beforeend', buildSiteHTML(siteName, emptyData, cfg));
    }
  }

  stats.innerHTML = buildStats(siteData);

  // Show map
  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('mapArea').style.display = 'block';

  // Animate bars after a tick
  setTimeout(() => {
    document.querySelectorAll('.tt-bar-fill').forEach(bar => {
      bar.style.width = bar.style.width; // trigger reflow
    });
  }, 100);
}

/* ================================================================
   INIT
   ================================================================ */

async function init() {
  let rawData;

  if (DATA_URL) {
    try {
      const resp = await fetch(DATA_URL);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      rawData = await resp.json();
      // Handle if it's wrapped in an array of arrays or has other structure
      if (!Array.isArray(rawData)) rawData = [rawData];
    } catch (err) {
      document.getElementById('loadingArea').style.display = 'none';
      document.getElementById('errorArea').style.display = 'block';
      document.getElementById('errorArea').textContent = 'Could not load kingdom data: ' + err.message + '. Using sample data.';
      rawData = SAMPLE_DATA;
      // Still render with sample data after showing error
      setTimeout(() => {
        const siteData = processData(rawData);
        render(siteData);
      }, 1500);
      return;
    }
  } else {
    rawData = SAMPLE_DATA;
  }

  const siteData = processData(rawData);
  render(siteData);
}

init();
</script>
